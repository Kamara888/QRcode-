{% extends 'base.html' %}
{% block title %}Confirm Access{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-warning">
            <div class="card-header bg-warning text-dark text-center">
                <h5><i class="bi bi-shield-lock"></i> Confirm Your Identity</h5>
                <p class="mb-0 small">Enter your password to access this protected action</p>
            </div>
            <div class="card-body p-4">
                <form method="post" action="{% url 'sudo-confirm' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">
                        <i class="bi bi-check-lg"></i> Confirm
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
