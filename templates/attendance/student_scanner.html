{% extends 'base.html' %}
{% block title %}Scan QR Code{% endblock %}
{% block extra_head %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<meta name="csrf-token" content="{{ csrf_token }}">
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h5><i class="bi bi-camera"></i> Scan Attendance QR Code</h5>
            </div>
            <div class="card-body text-center">
                <div id="reader" style="width: 100%; max-width: 400px; margin: 0 auto;"></div>
                <div id="scanResult" class="mt-3" style="display: none;"></div>
                <div id="scanError" class="mt-3" style="display: none;"></div>
                <button id="startBtn" class="btn btn-primary mt-3" onclick="startScanner()">
                    <i class="bi bi-camera"></i> Start Camera
                </button>
                <button id="stopBtn" class="btn btn-danger mt-3" style="display: none;" onclick="stopScanner()">
                    <i class="bi bi-stop-circle"></i> Stop Camera
                </button>
            </div>
            <div class="card-footer">
                <a href="{% url 'student-dashboard' %}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content text-center p-4" id="resultModalContent">
            <div id="resultIcon" style="font-size: 4rem;"></div>
            <h5 id="resultTitle" class="mt-3"></h5>
            <p id="resultMessage" class="text-muted mb-0"></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let html5QrCode = null;

function startScanner() {
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-block';
    document.getElementById('scanResult').style.display = 'none';
    document.getElementById('scanError').style.display = 'none';

    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
    ).catch(err => {
        showError('Camera error: ' + err);
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    });
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            html5QrCode.clear();
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
        });
    }
}

function onScanSuccess(decodedText) {
    stopScanner();
    let data;
    try {
        data = JSON.parse(decodedText);
    } catch (e) {
        showResult('❌', 'Invalid QR Code', 'This QR code is not recognized by the system.');
        return;
    }
    if (!data.session_id || !data.token) {
        showResult('❌', 'Invalid QR Code', 'Missing session or token data.');
        return;
    }
    submitScan(data.session_id, data.token);
}

function submitScan(sessionId, token) {
    document.getElementById('reader').innerHTML = '<div class="py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted">Recording attendance...</p></div>';

    fetch('/api/sessions/scan/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
        },
        credentials: 'same-origin',
        body: JSON.stringify({ session_id: sessionId, token: token }),
    })
    .then(r => r.json().then(data => ({ status: r.status, body: data })))
    .then(({ status, body }) => {
        if (status === 201) {
            if (body.status === 'present') {
                showResult('✅', 'Attendance Recorded!', 'You are marked as Present.');
            } else if (body.status === 'late') {
                showResult('⚠️', 'Marked as Late', 'You arrived after the grace period.');
            } else {
                showResult('✅', 'Attendance Recorded', 'Status: ' + body.status);
            }
        } else if (body.message === 'Already recorded') {
            showResult('ℹ️', 'Already Recorded', 'You already scanned this session. Status: ' + body.status);
        } else {
            showResult('❌', 'Failed', body.error || 'Could not record attendance.');
        }
    })
    .catch(err => {
        showResult('❌', 'Error', 'Network error. Please try again.');
    });
}

function showResult(icon, title, message) {
    document.getElementById('resultIcon').innerHTML = icon;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultMessage').textContent = message;

    const modal = new bootstrap.Modal(document.getElementById('resultModal'));
    modal.show();

    document.getElementById('resultModal').addEventListener('hidden.bs.modal', function () {
        resetScanner();
    });
}

function showError(msg) {
    document.getElementById('scanError').style.display = 'block';
    document.getElementById('scanError').className = 'alert alert-danger mt-3';
    document.getElementById('scanError').textContent = msg;
}

function resetScanner() {
    document.getElementById('reader').innerHTML = '';
    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('stopBtn').style.display = 'none';
    html5QrCode = null;
}

</script>
{% endblock %}
